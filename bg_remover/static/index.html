<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Фон Арилгагч — rembg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131f;
      --border: #2a2a40;
      --accent: #7c5cfc;
      --accent2: #c471ed;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #22d3a5;
      --radius: 18px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 0 60px rgba(124,92,252,0.08);
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124,92,252,0.05);
    }

    #drop-zone .icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
    }

    #drop-zone p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    #drop-zone strong {
      color: var(--accent);
    }

    #file-input { display: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(124,92,252,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 28px;
    }

    @media (max-width: 600px) {
      .preview-grid { grid-template-columns: 1fr; }
    }

    .preview-box {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: repeating-conic-gradient(#1a1a2e 0% 25%, #13131f 0% 50%) 0 0 / 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      position: relative;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 350px;
      object-fit: contain;
      display: block;
    }

    .preview-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,15,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: 12px;
      z-index: 10;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .status-bar {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .status-bar.success {
      background: rgba(34,211,165,0.1);
      border: 1px solid rgba(34,211,165,0.3);
      color: var(--success);
      display: block;
    }

    .status-bar.error {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff6b6b;
      display: block;
    }
  </style>
</head>
<body>

  <h1>✦ Фон Арилгагч</h1>
  <p class="subtitle">rembg AI ашиглан зургийн фоныг автоматаар арилгана</p>

  <div class="card">
    <div id="drop-zone">
      <span class="icon">🖼️</span>
      <p><strong>Зургаа энд чирж тавь</strong> эсвэл дарж сонго</p>
      <p style="margin-top:6px; font-size:0.82rem;">PNG, JPG, WEBP — дэмжинэ</p>
      <input type="file" id="file-input" accept="image/*"/>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="remove-btn" disabled>⚡ Фон Арилга</button>
      <button class="btn btn-outline" id="download-btn" disabled>⬇ Татаж авах</button>
      <button class="btn btn-outline" id="reset-btn">↩ Дахин эхлэх</button>
    </div>

    <div id="status-bar" class="status-bar"></div>

    <div class="preview-grid" id="preview-grid" style="display:none;">
      <div>
        <p class="preview-label">Эх зураг</p>
        <div class="preview-box"><img id="original-preview" src="" alt="Original"/></div>
      </div>
      <div>
        <p class="preview-label">Фон арилсан</p>
        <div class="preview-box" id="result-box">
          <div class="loading-overlay" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>AI боловсруулж байна…</p>
          </div>
          <img id="result-preview" src="" alt="Result" style="display:none;"/>
        </div>
      </div>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const removeBtn = document.getElementById('remove-btn');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');
    const originalPreview = document.getElementById('original-preview');
    const resultPreview = document.getElementById('result-preview');
    const previewGrid = document.getElementById('preview-grid');
    const loading = document.getElementById('loading');
    const statusBar = document.getElementById('status-bar');

    let selectedFile = null;
    let resultBlob = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) loadFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) loadFile(fileInput.files[0]);
    });

    function loadFile(file) {
      selectedFile = file;
      resultBlob = null;
      resultPreview.style.display = 'none';
      resultPreview.src = '';
      downloadBtn.disabled = true;
      setStatus('');

      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
        previewGrid.style.display = 'grid';
        removeBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      removeBtn.disabled = true;
      downloadBtn.disabled = true;
      loading.style.display = 'flex';
      resultPreview.style.display = 'none';
      setStatus('');

      const formData = new FormData();
      formData.append('image', selectedFile);

      try {
        const response = await fetch('/remove-bg', { method: 'POST', body: formData });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Алдаа гарлаа');
        }

        resultBlob = await response.blob();
        const url = URL.createObjectURL(resultBlob);
        resultPreview.src = url;
        resultPreview.style.display = 'block';
        downloadBtn.disabled = false;
        setStatus('✓ Фон амжилттай арилгалаа!', 'success');
      } catch (err) {
        setStatus('✗ ' + err.message, 'error');
      } finally {
        loading.style.display = 'none';
        removeBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(resultBlob);
      const name = (selectedFile?.name || 'image').replace(/\.[^.]+$/, '');
      a.download = name + '_no_bg.png';
      a.click();
    });

    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      resultBlob = null;
      fileInput.value = '';
      originalPreview.src = '';
      resultPreview.src = '';
      resultPreview.style.display = 'none';
      previewGrid.style.display = 'none';
      removeBtn.disabled = true;
      downloadBtn.disabled = true;
      setStatus('');
    });

    function setStatus(msg, type = '') {
      statusBar.textContent = msg;
      statusBar.className = 'status-bar' + (type ? ' ' + type : '');
    }
  </script>
</body>
</html>
