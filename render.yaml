services:
  - type: web
    name: degjin-ai-studio
    env: python
    buildCommand: "pip install -r requirements.txt && python download_model.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    autoDeploy: false
